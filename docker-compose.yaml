services:
  api:
    build:
      context: .
      dockerfile: docker/php/local.Dockerfile
    ports:
      - '${APP_PORT:-80}:8080'
      - '2112:2112'
    image: 'empattech/laravel-octane:local-8.4-2025.1.2'
    networks:
      - my-inventory
    volumes:
      - '.:/var/www/app'
      - './docker/php/.bashrc:/home/www/.bashrc'
      - './docker/php/php.ini:/usr/local/etc/php/php.ini'
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: 'postgres:18.1'
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'postgres:/var/lib/postgresql'
      - './docker/postgres/init:/docker-entrypoint-initdb.d'
    networks:
      - my-inventory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      retries: 3
      timeout: 5s

  #  horizon:
  #    build:
  #      context: .
  #      dockerfile: docker/php/local.Dockerfile
  #    command: php artisan horizon
  #    volumes:
  #      - .:/var/www/app
  #    depends_on:
  #      - redis
  #      - postgres
  #    networks:
  #      - my-inventory

  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'redis:/data'
    networks:
      - my-inventory
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
  boost-mcp:
    image: 'my-inventory:latest'
    build:
      context: .
      dockerfile: docker/php/local.Dockerfile
    networks:
      - my-inventory
    working_dir: /var/www/app
    entrypoint: ['php', 'artisan', 'boost:mcp']
    volumes:
      - '.:/var/www/app'
      - './docker/php/php.ini:/usr/local/etc/php/php.ini'
      - './docker/ssh:/home/www/.ssh'
      - './docker/php/.bashrc:/home/www/.bashrc'
    depends_on:
      - api
    stdin_open: true
    tty: false

volumes:
  postgres:
    driver: local
  redis:
    driver: local

networks:
  my-inventory:
    driver: bridge
